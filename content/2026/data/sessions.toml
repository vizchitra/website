subtitle = "A portrait of emissions prevented through public transit"
shortDescription = ""
longDescription = "One person choosing the metro or the bus over a cab or auto seems to change nothing. But these choices accumulate, and in aggregate they reach the air all of us breathe. To show you how, we'll ask you a few questions about your regular trip and plot it on a map alongside everyone else's. Then, you'll get a personal receipt showing how much carbon and fine particulate your way of getting around produces in a year and how much shifting some of that travel to transit would save. \n\n One person choosing the metro or the bus over a cab or auto seems to change nothing. But these choices accumulate, and in aggregate they reach the air all of us breathe. To show you how, we'll ask you a few questions about your regular trip and plot it on a map alongside everyone else's. Then, you'll get a personal receipt showing how much carbon and fine particulate your way of getting around produces in a year and how much shifting some of that travel to transit would save."
