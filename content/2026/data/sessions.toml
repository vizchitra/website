[[session]]
slug = "morning-melody"
sessionType = "Activities"
date = "2026-07-04"
time = ""
slot = ""
venue = "Bangalore International Centre"
title = "Morning Melody"
subtitle = "Your voice is already here. Let's find it together."
shortDescription = "Most people arrive at a conference already in their heads. This session pulls you out before the day begins. A vocal warm-up and collective sing-along that turns a room of strangers into a room that has made something together. If you have ever wanted permission to hum loudly in public, this is it."
longDescription = "Congratulations, you made it here on a Saturday morning! And you’re now staring at some unfamiliar faces. A conference room can sometimes feel a bit distant, but fear not, we’re here to shake off those morning blues. \n This session is a playful vocal warm-up and collective sing-along to pause, loosen up, open our voices, and tune into the same rhythm. Through simple exercises, surprising sounds, and shared song, we’ll create a moment of connection before the day unfolds, so you’re all set for the conversations, discussions and networking! \n You don’t need to be a singer. You don’t need any musical experience. Just unleash the bathroom singer within you! \n Come ready to make some noise, harmonise and go from strangers to not-so-strangers in minutes!"
speakerName = "Nikita Deshpande"
designation = ""
organisation = ""
speakerAbout = "Nikita is an Art & Animation Director and illustrator with over 12 years of experience bringing stories to life through expressive, concept-driven visuals. Her work spans editorial, animation, games, music videos, and brand identity, and is rooted in clarity, emotion, and atmosphere. \n She spent seven years as a Visual Artist and Designer at BBC News, where she created illustrations, animations, infographics, and motion graphics for digital, social, and broadcast platforms, helping audiences better understand complex stories through authentic and impactful design. As an independent creative, she has collaborated with clients including BBC Media Action, Purpose Global, Unbias the News, Revisual Labs, and Collective Newsroom, among others. \n Since childhood, Nikita has felt a pull towards listening to and learning Indian classical music. Under the guidance of Hindustani classical vocalist Nirali Kartik, she continues to nurture this lifelong passion alongside her visual practice."
