[[session]]
slug = "bite-sized-views"
sessionType = "Talks"
date = "2026-07-04"
time = "14:00 - 14:30"
slot = "afternoon"
venue = "Bangalore International Centre"
title = "Bite-Sized Views, Crore-Sized Backlog"
subtitle = "One number tells you nothing. One hearing tells you everything."
shortDescription = "India has 4.82 crore pending court cases. The number is staggering and, on its own, useless for a reporter. This talk is about breaking that backlog down to individual hearings and using exploratory visualization to find the stories hiding inside."
longDescription = "India's district courts have 4.82 crore pending cases. That number surfaces briefly when an exceptionally old case concludes, or when an annual report lands. Then it disappears again into the background hum of a system everyone knows is overwhelmed and almost no one can write about specifically.\n\nShalaka built Justice Delayed out of that frustration. As a court and crime reporter for Hindustan Times Pune, she had ground-level intuition about the backlog but nothing she could quantify, localize, or turn into a story. Official data was too aggregated to be useful. A district total tells you nothing about which courts, which case types, or which hearings have been pending the longest.\n\nJustice Delayed, developed with support from the Brown Institute for Media Innovation's Magic Grant, restructures district court data using individual case hearings as the smallest unit of analysis. That shift, from aggregated numbers to individual hearings, is what made exploratory visualization possible and useful.\n\nThis talk walks through what that looks like in practice: identifying courts with disproportionately old cases, spotting patterns in hearing schedules, and localizing pendency in ways that a ground reporter can actually act on. It also covers the gap between a large, messy dataset and a publishable insight, and how visualization helped bridge it.\n\nThe deeper argument is about method. Visualization here is not the end product of an investigation. It is the tool for figuring out where to look. If you work with large public datasets and spend more time lost in them than reporting from them, this talk is for you.\n"
speakerName = "Shalaka Shinde"
designation = "Independent Data Journalist"
organisation = ""
speakerAbout = "Shalaka is a journalist and founder of Justice Delayed, a court data resource built to facilitate journalistic inquiry of the Indian district court network. Her work as a data journalist is informed by her experience as a newspaper reporter in the early years of her career. Her passion project, Justice Delayed, provides data solutions for challenges that crime and court reporters face regularly. She is a graduate of the MS (data journalism) program at Columbia Journalism School, recipient of the Magic Grant by the Brown Institute of Media Innovation, and winner of the Tow/Brown Award for Excellence in Computational Journalism and Columbia Venture Competition. She has previously written for Bellingcat, The Quint, Hindustan Times and works freelance as a live data scraper for AP's election result database. Besides data democracy, her favourite topics are the untapped potential of remote sensing data for journalism and how underappreciated elephants are."
speakerImage = "/images/speakers/2026/speaker-shalaka.avif"
display = true
pageReady = true
order = 8

[[session]]
slug = "caption-this"
sessionType = "Talks"
date = "2026-07-04"
time = "11:15 - 11:45"
slot = "morning"
venue = "Bangalore International Centre"
title = "Caption This: Teaching Machines to Narrate Charts"
subtitle = "Generating captions is easy. Curating the right one is not. Can machines learn the difference?"
shortDescription = "A chart compresses data. A caption compresses the chart. This talk explores whether machines can learn that second compression well, and why generation turns out to be the easy part."
longDescription = "Every chart is a chain of compressions. A dataset becomes a visual. A visual becomes an insight. Each step throws away information deliberately, keeping only what matters. The last step, turning a chart into a caption worth reading, is the hardest. And it is the one that language models handle worst.\n\nJaidev has spent the last year trying to fix that. Not by generating more captions, which turns out to be straightforward, but by figuring out how to curate the right one. The problem is that a model can produce dozens of plausible captions for any chart. Knowing which one is accurate, useful, and meant for this audience, in this context, still takes a human.\n\nHis response is an extended PlotCaptions: an open dataset of over 150,000 charts with accompanying captions, built to serve two purposes. First, as a retrieval corpus to ground generation, giving models precedent rather than asking them to guess. Second, as a record of human judgment about what good captions look like, used to train ranking.\n\nThe pipeline that emerges is straightforward: retrieve similar charts and their best captions, generate candidates, rank against what humans have consistently preferred. This talk walks through what that system gets right, what it still gets wrong, and where the curation gap remains open.\n\nThe dataset, code, and trained models will be released before the talk. The audience is invited to use them, test them, and beat the benchmarks.\n"
speakerName = "Jaidev Deshpande"
designation = "Senior Software Engineer"
organisation = "Aftershoot"
speakerAbout = "For years, Jaidev has been trying to find the best way to narrate charts. He writes a newsletter called Being Bayesian, which uses statistics and dataviz to critique outrageous opinions on tech, economy and culture.\n\nHe currently works at Aftershoot, a SaaS startup where he leads the MLOps effort. You're likely to run into him at tech events."
speakerImage = "/images/speakers/2026/speaker-jaidev.avif"
display = true
pageReady = true
