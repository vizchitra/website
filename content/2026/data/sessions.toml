speakerAbout = "Meghana Singh is a design educator and textile practitioner whose work explores sustainability, material narratives, and craft-based learning. Her practice engages with textiles as a medium for storytelling, ecological reflection, and participatory engagement. Drawing from traditional craft knowledge, collaborative processes, and material experimentation, she creates tactile experiences that encourage audiences to engage with environmental concerns in embodied and accessible ways. \n\nWith experience across design education, grassroots initiatives, and interdisciplinary practice, her work often bridges research, making, and community-based learning. Deeply interested in slow processes, repair cultures, and regenerative approaches to design, she uses textiles to translate complex ecological ideas into sensory and spatial encounters that invite reflection, dialogue, and collective awareness.\n"
