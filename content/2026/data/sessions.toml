[[session]]
slug = "data-playground"
sessionType = "Activities"
date = "2026-07-04"
time = "1415 to 1500"
slot = ""
venue = "Bangalore International Centre"
title = "Thurro's Data Playground"
subtitle = "You bring the question and the craft. Thurro brings updated, clean, verified data to match."
shortDescription = "If you work with data, the hardest part is often the data itself: finding reliable, trustworthy, and updated sources, or the dataset you need in your workflow but cannot easily get. Visualisers are artists: Thurro offers you tools. In this hands-on playground, you bring the questions and the curiosity on India, and Thurro will surface the data from 800+ sources immediately. On our connectors, let’s explore together. Where we may not yet have data, your asks shape what Thurro ingests next."
longDescription = "If you make data visualisations, you know the hardest part is often the data itself. Reliable, trustworthy, updated Indian datasets are scattered, gated, or simply missing. You are often left with only half the equation: a sharp question or a story you want to tell, but not the data to ground it. Thurro is a structured intelligence platform that helps you build on your curiosity by surfacing the data you need in the work environment where you need it. Thurro's Data Playground puts that to work live, with the audience's asks driving what happens on screen. \n\n Before the session, attendees submit the craziest data questions they have always wanted to ask but never had the data access for: come in through social channels and physical question boards at the venue. A curated set of those questions anchors the live segment. In the room, Akhilesh and Aarushi open up ThurroConnect and build alongside you. \n\n The 45 minutes feature a short framing, a quick look at how Thurro works, and collaborative play. Attendees’ queries power Thurro’s responses served with real, updated, verified data. To take part fully, bring your question. If you can, do latch on to ThurroConnect via our custom MCP. Markets, tolls, ports, exports, companies, Vahan, pollution - you name it. \n\n You leave with a data tool you will actually want to keep using, a clear sense of what to ask it and how, and direct access to the people building it. The session is honest about its limits too: it is a shared room, not a one-to-one consult, the team will hear what Thurro does not yet cover or capabilities that they should build. The questions this room raises feed directly into what Thurro indexes, models, and ships next."
speakerName = "Akhilesh Tilotia"
designation = "Co-founder"
