[[session]]
slug = "no-clean-maps"
sessionType = "Talks"
date = "2026-07-04"
time = "15:45 - 16:00"
slot = "afternoon"
venue = "Bangalore International Centre"
title = "There Are No Clean Maps"
subtitle = "Maps look certain. The hidden work behind every one of them is not."
shortDescription = "Every map is a negotiation. District boundaries shift, pincodes don't nest into districts, village data from 2011 sits inside boundaries redrawn in 2022. This talk unpacks the invisible analytical work that happens before any map gets made."
longDescription = "We talk about \"putting data on a map\" as if geography were stable. Crisp boundaries. Clear hierarchies. Agreed definitions. In practice, none of that exists.\n\nEvery map is a reconciliation. Between data sources collected at different times, administrative boundaries that have been redrawn, spatial units that refuse to nest cleanly into each other, and datasets whose geographic provenance is simply unknown.\n\nThis talk is about that invisible work. Drawing from real spatial analysis across village, pincode, hex and district-level data in India, Supriya walks through five situations where geographies break down: hierarchies that are conceptually nested but spatially inconsistent, parallel units like districts and pincodes that neither align nor exclude each other, granularity that has to be constructed from scratch, spatial logics that fundamentally conflict (raster grids versus hex systems), and survey data that arrives at the district level without clarity on which boundary definition was used.\n\nFor each case, the talk surfaces the analytical decisions involved, what gets assumed, what gets lost, and how much uncertainty gets quietly carried forward into the final visualisation.\n\nThe argument is not that clean maps are impossible. It is that spatial visualisation begins long before design, in decisions most practitioners never make visible. The question is not whether trade-offs exist. It is whether we acknowledge and communicate them.\n\nIf you work with geographic data at any level of granularity, this talk will change how you think about the map you are building.\n"
speakerName = "Supriya Joshi"
designation = "Senior Data Analyst"
organisation = "EPIC World"
speakerAbout = "Supriya is a Data Analyst and Researcher with 4+ years of experience in translating complex datasets into actionable insights. Primarily in the impact space, she has led field research, conducted analysis, and developed data models. Her work spans a broad variety of data - survey, geospatial, government and modelled. This breadth of experience has given her the ability to see data not just as numbers, but as stories with real-world consequences.\n\nCurrently at EPIC World. Previously at J-PAL and Datarivu."
