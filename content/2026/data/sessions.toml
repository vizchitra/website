title = "Afternoon Rhythm"
subtitle = "Every beat is data. Every pattern is yours."
shortDescription = "Midway through a packed day, your attention is the first thing to go. This session brings it back with a solo djembe performance that pulls the room into call-and-response, claps, and a shared beat you did not expect to be following at a data visualisation conference. Rhythm is data too, and this is where you feel it."
longDescription = "Rhythm is not just music. It is coordination, pattern, repetition, and response. It is data that lives in the body before it lives anywhere else. \n\n Midway through a packed day of talks and conversations, this session invites you to step out of your head and into something more immediate. A solo djembe performance, part interaction, part exploration, where the drum sets a beat and you find your place within it. \n\n You will clap. You will respond. You will discover where your instinct sits in relation to the group's pulse. Some will lock in early. Others will find it later. Both are the point. \n\n Finding Your Rhythm is a chance to listen, to move, and to notice what happens when you stop processing and start feeling. The beat is simple. What you do with it is yours."
