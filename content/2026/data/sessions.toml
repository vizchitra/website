[[session]]
slug = "chart-crimes-autopsy"
sessionType = "Dialogues"
date = "2026-07-04"
time = "library"
slot = "afternoon"
venue = "Bangalore International Centre"
title = "A Collective Autopsy of Chart Crimes"
subtitle = "Charts look objective. That's what makes them dangerous."
shortDescription = "Charts look objective. That's what makes them dangerous. This dialogue builds your pattern recognition for the systematic ways visualisations mislead, and the questions to ask before you  trust what you see."
longDescription = "Bar charts with truncated axes. Correlations that vanish when you break the data down. Trend lines that hide more than they reveal. Most misleading charts aren't made with bad intent. They come from well-meaning people making common mistakes. But intent doesn't change impact.\n\nCharts are persuasive precisely because they appear rigorous. When data is visualised, we assume someone has done the work and checked the numbers. That assumption makes misleading visualisations dangerous, especially in public health, climate reporting, and policy debates where most readers won't scrutinise every plot they encounter.\n\nThis session takes the contrarian view. While much of the conversation in data visualisation focuses on how to make better charts, this dialogue asks the inverse: what makes charts fail? What are the systematic ways visualisations mislead, and how do we spot them?\n\nWe'll build a shared vocabulary around patterns like Simpson's paradox, base rate neglect, ecological fallacy, survivorship bias, and cherry-picking. For each concept, you'll see what it looks like visually, why it happens, and what cues to look for. Then the room works together, examining real visualisations from news, research, and reports to put that vocabulary into practice.\n\nYou'll leave not as a cynic, but as an informed sceptic. Sharper questions. Better pattern recognition. And a clearer sense of the pitfalls worth watching for in your own work.\n"
speakerName = "Agriya Khetarpal"
designation = "Software Engineer"
organisation = "Quansight"
speakerAbout = "Agriya is a software engineer at Quansight, where he works on scientific open source software in the Scientific Python and Jupyter ecosystems. He is passionate about advancing science policy in India and believes that data, communicated honestly and rigorously, is one of its most powerful tools, a conviction that keeps him equally at home, whether in a terminal or in a policy debate."
