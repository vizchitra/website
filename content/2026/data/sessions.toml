speakerAbout = "Akhilesh has a unique perspective in his commentary as he views the world through the various lenses of an entreprenuer, government officer, an economist, a banker, and a strategist. These multiple world-views have shaped him as a dot-joiner and has powered his two books on India's macroeconomy and administration."
