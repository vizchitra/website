[[session]]
slug = "shape-health-costs"
sessionType = "Talks"
date = "2026-07-04"
time = "15:45 - 16:00"
slot = "afternoon"
venue = "Bangalore International Centre"
title = "The Shape of Health Costs"
subtitle = "Every chart simplifies reality. The best ones carry complexity with care."
shortDescription = "Healthcare data is buried in jargon, fear, and asymmetry. This talk is about the craft of making it human: the editorial decisions, chart choices, and design guardrails behind DataLabs, Plum's initiative on making explainers on the real cost of health in India."
longDescription = "Every chart simplifies. The question is whether the simplification serves the reader or obscures what they most need to know.\n\nHealthcare data in India is a black box. The cost of chronic disease is buried in claims forms and scientific reports most people will never read. And even when data is available, the language tends to be cold, clinical, and shot through with fear mongering that makes people look away rather than engage.\n\nPlum processes over 125,000 health insurance claims, 100,000 tele health consultations, and 25,000 health checkups every year. That is a lot of data. DataLabs is their attempt to turn that into something the people it is actually about can use.\n\nThis talk is about the craft behind that work. Saurabh will walk through the full editorial and design process: how they decide which stories to tell from a dataset full of possibilities, which chart types carry complexity without overwhelming, and where a simple table does the job better than any visualization.\n\nYou will hear why they chose horizon charts over bar charts, why violin charts work for length-of-stay data, and what interactive elements help readers who have never encountered certain chart types before. You will also hear about the quieter decisions: qualitative research to catch narrative bias before it reaches the reader, privacy guardrails when working with real patient data, and the editorial calls about which data points to cut because they would overwhelm rather than illuminate.\n\nDataLabs is not a dashboard. It is an editorial initiative built on the belief that health data should serve the people it describes. The craft is in making complexity feel human rather than intimidating.\n"
speakerName = "Saurabh Arora"
designation = "Chief Technology Officer"
organisation = "Plum"
speakerAbout = "Saurabh is the cofounder and CTO of Plum, where he leads Engineering, Product, and Design. Plum processes over 125,000 health insurance claims every year — and Saurabh wanted that data to do more than sit in spreadsheets. He created Datalabs, an initiative that turns claims data into interactive visual investigations about cost of healthcare. Their stories on cancer costs and heart disease burden have combined rigorous analysis with accessible narrative design to make complex health economics legible to anyone. Saurabh is interested in the craft of making the intimidating feel approachable, and the invisible feel urgent."
speakerImage = "/images/speakers/2026/speaker-saurabh.avif"
display = true
pageReady = true
order = 6

[[session]]
slug = "majestic-map-redesign"
sessionType = "Talks"
date = "2026-07-04"
time = "10:30 - 10:45"
slot = "morning"
venue = "Bangalore International Centre"
title = "A Majestic Map Redesign: Data, Design & Government"
subtitle = "Maps shape how cities feel. One bus station showed it."
shortDescription = "Majestic in Bengalure handles 3 lakh daily commuters, 300+ routes and 36 platforms. Its maps hadn't changed in 20 years. This talk traces what it took to redesign them."
longDescription = "Majestic is the heart of Bengaluru's transit system. Over 3 lakh people pass through it every day, navigating 300+ bus routes, 36 platforms, a railway station, and now a metro interchange. For twenty years, the maps guiding them had not changed.\n\nShubhra worked with BMTC, WRI India, and Villgro at Bengawalk to change that. This talk traces the full process behind the redesign: from user research and site analysis to categorising public data, building a design system, gathering feedback across multiple iterations, and finally implementing it on-site.\n\nBefore any of that could happen, 150+ routes had to be made skimmable in seconds. Relationships between platforms and their directions across the city had to be made visible for the first time. And the people who actually use the station, not designers, not planners, had to be the starting point.\n\nThe talk also covers the part that rarely gets discussed: working with government. Getting civic bodies to see the value of user-centric design, to invest in a pilot, and to trust that good wayfinding is worth the effort. The argument is simple but not easy to make: cities that work for people start with design that starts with people. And that can begin with one map at one station.\n"
speakerName = "Shubhra Agarwal"
designation = "Creative Lead"
organisation = "Bengawalk"
speakerAbout = "Shubhra Agarwal is a multidisciplinary designer and filmmaker working at the intersection of people, culture and planet. Shubhra graduated from the National Institute of Design, Ahmedabad, India and works on visual design, web design, data viz and filmmaking projects.\n\nTheir award-winning short film '火焰山的人们 People of the Flaming Mountain', one of the only films on Chinese Uighur Muslims, is recognised and celebrated across the globe. Shubhra believes that the goal informs medium, not the other way around, and uses both design and film to achieve it. Their recent interests include public transit signage, birding and travel-food memoirs.\n"
speakerImage = "/images/speakers/2026/speaker-shubhra.avif"
display = true
pageReady = true
order = 2

[[session]]
slug = "viz-speed-trust"
sessionType = "Talks"
date = "2026-07-04"
time = "11:45 - 12:00"
slot = "morning"
venue = "Bangalore International Centre"
title = "Design for Speed and Trust, Together."
subtitle = "AI in radiology creates high-stakes decisions. Good viz helps people make them thoughtfully."
shortDescription = "When AI reads a scan, clinicians face a dangerous choice: trust the algorithm blindly or slow down to verify it. This talk shares a framework for designing interfaces that earn trust without sacrificing speed, with lessons that transfer well beyond healthcare."
longDescription = "Radiology is one of the most data-dense, high-stakes environments for visualization. The input is a medical image. The output is a diagnosis. And now, somewhere in between, there is an AI making predictions that the radiologist has to act on, fast.\n\nThe problem is not whether the AI is accurate. It is whether the radiologist can trust it without abandoning their own judgment, and without losing time they do not have.\n\nThis talk is about resolving that tension through design. Bargava shares his journey building visualization interfaces for radiologists: what failed, what worked, and the specific techniques that made AI feel like a collaborator rather than a black box demanding compliance.\n\nYou will see how spatial anchoring grounds abstract AI predictions in familiar anatomy, how non-destructive uncertainty layers let radiologists interrogate model confidence without losing sight of the underlying scan, and how progressive disclosure interfaces reduce cognitive load while keeping the human firmly in control.\n\nThe domain is radiology. The problems are universal: trust, uncertainty, cognitive load, and the question of how much agency to hand to an algorithm. If you design dashboards, data tools, or any interface where AI and human judgment have to coexist, the framework here is directly transferable.\n\nNo medical background required.\n"
speakerName = "Bargava Subramanian"
designation = "Founder & AI Builder"
organisation = ""
speakerAbout = "Bargava is an experienced AI leader with over 20 years of experience building and architecting cutting-edge data and AI products. A three-time founder, he blends technical depth with an entrepreneurial spirit. For the past five years, Bargava has been focused on building in the Healthcare AI sector, developing solutions that bridge the gap between complex technology and patient care. He is a strong believer in the power of small teams."
speakerImage = "/images/speakers/2026/speaker-bargava.avif"
