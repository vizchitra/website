speakerAbout = "Sadhana is a transdisciplinary designer guided by curiosity and a love for exploring the spaces between people, science, design, and technology. With a background in computer science and design, she combines technical thinking with creativity to build experiences that feel thoughtful and engaging.\n\nShe is especially drawn to tangible work and enjoys creating experiences that people can physically move through, interact with, and connect to. Her practice focuses on storytelling, spatial experiences, and emotional connection. More than anything, Sadhana loves seeing people respond to and enjoy the experiences she creates, finding meaning or curiosity within them."
