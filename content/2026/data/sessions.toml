[[session]]
slug = "curators-dilemma"
sessionType = "Dialogues"
date = "2026-07-04"
time = "Library"
slot = "morning"
venue = "Bangalore International Centre"
title = "The Curator's Dilemma"
subtitle = "When making is easy, choosing is the craft."
shortDescription = "When making is easy, choosing is the craft. This hands-on dialogue explores what good judgment looks like when AI hands you five defensible charts and you need to ship one."
longDescription = "My team creates 9 variations of a chart in 15 minutes. All defensible. None of them are wrong or bad charts. My afternoon is spent staring at them, trying to figure out which one is actually good!\n\nAfter decades of building data viz, the making part is easy and fast now. What's slow is the choosing. And most of us haven't developed the muscles for that yet. This dialogue is about that shift happening right now, from construction to curation. The much harder skill of selecting, refining and deciding from abundance rather than building from scratch.\n\nYou'll start by ranking five visualisations of the same dataset on a wall, dot stickers in hand, before anyone speaks. Then small groups dig into the why, using prompt cards to surface the criteria people use, often without knowing they use them.\n\nThen comes the reveal: which charts were AI-generated, and which were human-made. Rankings can get revisited and our own biases can surface. The conversation in the dialogue can get honest about what craft actually means for us now.\n\nThe session closes with the room building a shared curator's checklist together. The  practitioner questions you can ask the next time you're staring at a wall of plausible visualisation options.\n\nYou'll leave with that checklist, a sharper sense of your own evaluation instincts, and a clearer picture of where your defaults might be leading you astray.\n"
speakerName = "Anand S"
designation = "LLM Psychologist"
organisation = "Straive"
speakerAbout = "Anand is an LLM psychologist at Straive, where he researches AI and publishes demos. Earlier, he co-founded Gramener, a data storytelling company. He's listed among India's top 10 data scientists and AI influencers and is a regular TEDx/Pycon speaker.\n\nAnand is an alumnus of IIM Bangalore, IIT Madras, London Business School, IBM, Infosys Consulting, Lehman Brothers, and BCG.\n\nMore importantly, he hand-transcribed every Calvin & Hobbes strip ever, is addicted to Minecraft & Anime (thanks to his daughter), and dreams of watching every film on the IMDb Top 250 (except The Shining)."
