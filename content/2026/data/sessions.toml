longDescription = "Puddle Beneath the Plate is a tangible data visualization that uncovers the hidden water footprint embedded in the food we consume. Taking the form of a puddle-shaped placemat, the artifact translates water consumption data into a physical and interactive dining experience. Ripple patterns engraved within the placemat represent the amount of water required by the most water-intensive ingredients in a meal, making an otherwise invisible resource visible at the point of consumption. By bringing data to the dining table, the project invites reflection on everyday food choices and their environmental impact, fostering greater awareness of water use and sustainability."
