[[session]]
slug = "panes-of-heat"
sessionType = "Exhibition"
date = "2026-07-04"
time = ""
slot = ""
venue = "Bangalore International Centre"
title = "Panes of Heat"
subtitle = "Windows into a future too hot to step outside"
shortDescription = ""
longDescription = "A summer afternoon in Delhi reads 42°C on the weather app. For a street vendor selling fruit by the roadside, the experience of heat is closer to 50°C. \n\n As the world warms, this gap between heat data and lived experience of heat continues to widen. Days feel hotter, nights offer less relief, and prolonged heat impairs the body's ability to step outdoors, work, travel, rest, and recover.  \n\n Panes of Heat translates a year of urban heat into architectural form. Two skyscrapers stand side by side: one records air temperature, the other shows felt temperature. Each window is a day in 2024, the hottest year on record globally. Each passing hour on the clock points to two different realities of the same day.  \n\n The towers are reflective of concrete spaces that hold heat long into the night. Viewers are invited to feel the contrast between recorded temperatures and what the body endures: a dynamic, uneven, and unequally distributed experience of heat. \n\n We would like to thank Parth Bisen and Aditi Bhatt for their help in building this project."
speakerName = "Kashvi Bansal"
designation = "Editorial Designer"
organisation = "The Ken"
