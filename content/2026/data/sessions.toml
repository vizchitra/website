[[session]]
slug = "decode-chart-game"
sessionType = "Activities"
date = "2026-07-0t"
time = "15:45 to 16:30"
slot = ""
venue = "Bangalore International Centre"
title = "Decode the Chart Game"
subtitle = "Follow the clues. Uncover the story."
shortDescription = "Step into the world of visual puzzles with Decode the Chart! In this interactive game, participants are presented with charts stripped of labels and context. The challenge? To uncover the hidden story behind the visuals using only patterns and intuition. Blending playful competition with serious data literacy, this session sparks curiosity, sharpens analytical thinking, and emphasizes the art of storytelling in visualizations."
longDescription = "We often say that data speaks for itself. This session challenges that assumption. By removing titles, annotations, labels, and context from carefully selected visualizations, participants experience what happens when a chart is left to speak on its own. \n The session opens with a fast-paced visual challenge: participants are shown several well-known visualizations with key contextual elements removed (e.g, climate strips) and asked to infer what they represent, setting the stage for a deeper exploration of how we interpret visual information. Sounds easy enough! \n\n Next comes the main challenge. Participants are divided into small teams of 3–4 and introduced to the rules of the game. Each team receives a visualization where the visual marks, colors, chart structure, and creator credits remain intact, but all contextual clues including the title, subtitle, annotations, legend labels, and source narrative have been removed. Working together as data detectives, teams must determine what the chart represents, what the colors or categories signify, the key insight being communicated, and how confident they are in their interpretation on a scale of 1 to 5. (1 = least confident, 5 = most confident). Armed only with visual clues, they observe patterns, develop theories, debate interpretations, and defend their reasoning before the original chart and story are revealed. \n \n With each reveal, the room explores how context changes understanding. Which assumptions were correct? Which were completely off? What role did titles, annotations, and storytelling play in guiding interpretation? The focus is not on getting the right answer, but on uncovering how people make sense of visual information. \n\n By the end of the session, participants will have sharpened their visual literacy, challenged their assumptions, and gained a deeper appreciation for the design choices that transform data into understanding. The result is a lively, discussion-driven experience that turns attendees from chart readers into data detectives."
speakerName = "Arshi Saleh"
designation = "Tableau Developer"
organisation = "Data Visual Designer"
speakerAbout = "Arshi Saleh is a freelance Tableau Developer and Data Visual Designer. She serves as Community & Events Coordinator for DVS GeoIG, is Bengaluru TUG Co‑Lead and Tableau Ambassador (2025–2026). Her work has been recognized with two Viz of the Day features, a 2nd‑place finish in the DataViz Competition organized by WIA, and three entries showcased in the Information is Beautiful Longlist.\n\n Focused on creating data stories with social impact, Arshi is passionate about community‑led learning. She actively contributes to initiatives that make data literacy more accessible while fostering collaboration, mentorship, and knowledge sharing within the global data visualization community."
