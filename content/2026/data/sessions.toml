[[session]]
slug = "timely-timeless-stories"
sessionType = "Talks"
date = "2026-07-04"
time = "10:00 - 10:30"
slot = "morning"
venue = "Bangalore International Centre"
title = "Telling Timely & Timeless Stories with Data"
subtitle = "A hundred ways to see India. Learning to see the difference."
shortDescription = "India's data jungle is vast, unruly, and full of surprises. This talk traces the making of 100 Ways to See India and the craft of turning elusive numbers into stories that are both timely and timeless."
longDescription = "Every Indian can fit in Kerala if we all lived as densely as northeast Delhi. Fifty-six mother tongues are officially classified as Hindi. Almost nobody in India is unemployed after the age of 29.\n\nThese are not the facts that make headlines. They are the facts that make you stop and think differently about the country you live in.\n\n100 Ways to See India started the way most good journalism does: out of professional need, occasional curiosity, and a stubborn refusal to let interesting numbers stay buried in PDFs. Over years of hunting elusive data across India's sprawling statistical jungle, Rohit Saran and Sajeev Kumarapuram found themselves sitting on something bigger than a series of stories. They found a portrait.\n\nThis talk traces the making of that portrait. What it took to turn India's bewildering diversity into accessible visuals. Which questions led somewhere surprising and which promising threads dissolved into data gaps. How you decide, from a country that could fill a thousand books, which hundred ways are worth seeing.\n\nUnderneath the book journey is a longer conversation about the craft of data storytelling: what makes a story timely, what makes it timeless, and what it takes to tell the difference before you start building the chart.\n"
speakerName = "Rohit Saran"
designation = "Managing Editor"
organisation = "The Times of India"
speakerAbout = "Rohit Saran is the Managing Editor of The Times of India. He has served as Executive Editor of The Times of India, The Economic Times, and India Today, and was Editor-in-Chief of Business Today and Khaleej Times. Since the 1990s, he has practised data and visual journalism across leading newsrooms — blending numbers, visuals, and text to tell richer stories and to create enduring news products.\n\nRohit teamed up with Sajeev Kumarapuram, Design Editor of The Times of India to author '100 Ways to See India -- Stats, Stories and Surprises' which was published by Harper Collins India earlier this year. Rohit and Sajeev have spent years exploring India's data jungle—mostly out of professional need, at times out of curiosity. Along the way, they've hunted elusive numbers, dodged PDF traps, and found joy in telling stories through charts."
speakerImage = "/images/speakers/2026/speaker-rohit-saran.webp"
display = true
pageReady = true
order = 3

[[session]]
slug = "data-viz-drift"
sessionType = "Talks"
date = "2026-07-04"
time = "14:45 - 15:15"
slot = "afternoon"
venue = "Bangalore International Centre"
title = "The Data Viz Drift: What Nobody Tells You"
subtitle = "Data viz rarely stays data viz. An honest reckoning with the careers behind the craft."
shortDescription = "Many data viz practitioners don't end up doing data viz. They drift into UX. This talk names that pattern honestly, explores what transfers and what gets left behind, and asks what a data viz career actually looks like as AI commoditises the craft."
longDescription = "Here is something the data visualization community rarely says out loud: most data viz practitioners don't end up doing data viz. They drift into UX. Not because they failed, but because that is how most product organisations are structured, and because the skills transfer well enough that the drift feels natural until you look back and notice what got left behind.\n\nSandeep has spent years hiring, mentoring, and working with designers across experience levels. This talk is the honest conversation he keeps having with early-career practitioners who are trying to figure out where data visualization actually fits in the real world.\n\nThe first part is a reality check. Why does the drift happen? What does the career landscape actually look like, versus how it is described in job postings and course syllabuses? Is data visualization a destination role or a gateway skill in most product organisations?\n\nThe second part is about what compounds. Curiosity, fast domain learning, comfort with ambiguity, the ability to frame data in context: these are the skills that travel well across the drift and grow more valuable over time. Tool mastery is not on that list.\n\nThe third part looks forward. As AI automates chart selection, visualization generation, and interaction patterns, the traditional data viz skill set is being commoditised. Knowing which chart to use will matter less than knowing why it works, when it fails, and how to shape meaning, narrative, and clarity. The practitioners who differentiate themselves will do so through taste and judgment, not through tool fluency.\n\nThe talk closes with a call to leaders and organisations to think harder about what they are actually asking data visualization designers to do, and whether they are creating the conditions for that work to matter.\n"
speakerName = "Sandeep Karmarkar"
designation = "Head of Design"
organisation = "Atlassian"
speakerAbout = "Sandeep Karmarkar is a design leader with over two decades of experience spanning visual design, UX, product strategy, and team leadership across global technology companies. He currently serves as the Head of Design for the IT Operations portfolio at Atlassian, where he leads teams focused on building effective experiences for managing complex systems at scale. He has previously held leadership roles at Uber, Google, and Nutanix.\n\nOver the years, he has worked on products used by millions across mobility, cloud platforms, security, and public transport experiences in India. Deeply passionate about data visualization and information design, Sandeep has actively hired, mentored, and supported many young designers from Information Design backgrounds throughout his career. He is equally passionate about building high-performing teams and bridging industry with education through talks, workshops, mentorship, and teaching engagements.\n\nA marathon runner, trekker, and digital artist, he brings the same curiosity and endurance from the mountains into the world of design leadership, innovation, and storytelling.\n"
speakerImage = "/images/speakers/2026/speaker-sandeep-karmarkar.webp"
display = true
pageReady = true
