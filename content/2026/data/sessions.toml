[[session]]
slug = "whats-in-your-bag"
sessionType = "Talks"
date = "2026-07-04"
time = "14:30 - 14:45"
slot = "afternoon"
venue = "Bangalore International Centre"
title = "What's in Your Bag? Really!"
subtitle = "Data does not travel on its own. You have to construct the meaning."
shortDescription = "National statistical offices produce mountains of data that rarely reach the people making decisions. This talk shares an unconventional method for changing that: asking government officials to build data stories from whatever is in their bag."
longDescription = "Data only gains value when it is used. That sounds obvious. In practice, it almost never happens by default.\n\nNational Statistical Offices across Asia and the Pacific produce enormous volumes of data. The assumption is that dissemination leads to uptake, and uptake leads to impact. Sneha's work has shown that this chain breaks down almost immediately, long before data reaches a policy decision.\n\nTo understand why, she asks government officials a simple question: what's in your bag? Participants pull out currency notes, house keys, umbrellas, whatever they happen to be carrying, and use those objects to construct data stories. The exercise is deliberately low-stakes and physical. It reveals something fundamental: data does not communicate itself. Meaning is built by the people in the system, shaped by context, institutional culture, and whether anyone ever made evidence feel accessible in the first place.\n\nThis talk draws on that work to explore what it actually takes to shift institutional appetite for evidence. Not better dashboards or longer reports, but a different understanding of how meaning travels through a system and who is responsible for carrying it.\n\nYou will leave with a clearer picture of how national statistical systems operate, where the chain from data production to policy action breaks down, and what practitioners, journalists, researchers, and community advocates can do to strengthen it.\n"
speakerName = "Sneha Kaul"
designation = "Statistics Analyst"
organisation = "UN Women Asia-Pacific"
speakerAbout = "Sneha is a Statistics Analyst at UN Women's Asia-Pacific Regional Office in Bangkok, where she supports the global flagship program Women Count. Over seven years across the UN system, she has worked with government statisticians from 40+ national statistical offices on gender statistics and statistical literacy.\n\nHer analytical work brings together survey microdata, geospatial data, and non-traditional sources to produce evidence that gets used. This work has shaped UN flagship publications including the ASEAN Gender Outlook 2022 and 2024 and several gender-environment publications, presented at the UN General Assembly and have informed intergovernmental processes including the climate COPs.\n\nSneha holds a master's in behavioral science and public policy from the London School of Economics, where she studied how policy design and communication can nudge communities toward better outcomes. That lens shapes how she thinks about data communication, and what makes public data legible, participatory, and actionable.\n"
speakerImage = "/images/speakers/2026/speaker-sneha.avif"
display = true
pageReady = true
order = 5

[[session]]
slug = "viz-rural-care"
sessionType = "Talks"
date = "2026-07-04"
time = "10:30 - 10:45"
slot = "morning"
venue = "Bangalore International Centre"
title = "Visualising care in rural healthcare"
subtitle = "Data should serve the people it's about. This is what that looks like in practice."
shortDescription = "In rural healthcare, data travels upward and rarely comes back useful. This talk shares what happens when visualization is reimagined as care infrastructure, co-designed with frontline workers, volunteer doctors, and Gram Panchayat officers in Kundapura, Karnatak"
longDescription = "Data in rural healthcare moves in one direction. It is collected on the ground, travels upward for analysis, and returns, if it returns at all, as lengthy reports, templated dashboards, and messy Excel files that serve bureaucratic accountability rather than local decision-making.\n\nAbhiram's work starts from a different question: what would visualization look like if it was designed as care infrastructure, built alongside the people who actually use it?\n\nThis talk presents the Decision Support System (DSS) developed with a Community Palliative Care initiative across seven Gram Panchayats in Kundapura, Karnataka. Co-designed with frontline workers, mobile care teams, volunteer doctors, and Gram Panchayat officers, the DSS is decentralized, offline-first, and built around three core artefacts. The DSS is a joint effort between Aruvu Collaboratory, KHPT, RDPR - Government of Karnataka and Niramaya Society Udupi.\n\nPhygital care profiles give care teams and volunteer doctors a way to design and monitor individualised care plans across medical, emotional, and psychosocial domains. Visualizations include family trees to map caregiving patterns, hand-drawn route maps where geospatial data does not exist, and pain assessment scales built on the visual language of the care teams themselves.\n\nCare seeker booklets are physical books given directly to each patient: no-tech interfaces for tracking conditions, monitoring daily care, logging visits, and carrying tear-off referral slips to hospitals and PHCs.\n\nA data atlas gives Gram Panchayats, PHCs, and the taskforce a customisable spatial view of community-level insights, supporting everything from medical consultations to scheme allotment to infrastructure decisions.\n\nThe talk surfaces what it actually takes to build visualisation systems for contexts with varying literacy, low connectivity, and multilingual needs, and what it means to prioritise people and decisions over features and numbers.\n"
speakerName = "Abhiram Jois"
designation = "Creative Technologist"
organisation = ""
speakerAbout = "Abhiram is a creative technologist who is interested in anything creative and anything technology currently working as a GIS developer at WELL Labs. His work largely encompasses imagining, challenging and building technology with communities. He has worked with organisations like Aruvu Collaboratory, Design Beku and Janastu. He has worked with communities in Kundapura, Bidar, Channapatna etc.\n\nHe graduated in human centered design from Srishti Manipal institute and did a semester of exchange with the interaction design studio at Glasgow School of Art. In what feels like a parallel life he dapples with Kannada theatre, film and art direction as an artist in Danka Art Collective. If you spot him in the wild feel free to stop and tell him about your favourite short film or video essay available on YouTube.\n"
speakerImage = "/images/speakers/2026/speaker-abhiram.avif"
display = true
pageReady = true
order = 9

[[session]]
slug = "atlas-of-intangibles"
sessionType = "Talks"
date = "2026-07-04T11:45"
time = "11:45 - 12:00"
slot = "morning"
venue = "Bangalore International Centre"
title = "Atlas of Intangibles"
subtitle = "The senses hold data too. Mapped across cities, one walk at a time."
shortDescription = "A place is not just its coordinates. It is the waft of petrichor, the sonic shifts of a street, the wear and tear of walls that have witnessed decades. Atlas of Intangibles is a data experience built from score-based walks, making the sensory legible through images, audio, and interconnected views."
longDescription = "We know a place through our senses before we know it through any map. The waft of petrichor after rain. Bird songs in the background. The sound of traffic, the rhythm of footfalls, the marks left on walls by time and human activity. These fleeting encounters are the actual fabric of a place, and traditional cartography has no vocabulary for any of them.\n\nAtlas of Intangibles is Priti's attempt to build that vocabulary.\n\nThe project begins on foot. Using score-based data walks, Priti collects sensory data through two lenses: Witness Marks, observations of wear, weathering, and the signs cities accumulate over time, and Sonic Shifts, the dynamic, layered soundscape of urban life. Each data point is rich in context, pairing field notes and sketches with photography, audio recordings, and video.\nThe digital experience built from this data invites viewers to choose themes and explore the collected observations as three distinct views: journeys through the walk, connections between related data points, and typologies across the gathered material. The work asks what it looks like to preserve ambiguity and affect in a data experience rather than resolve them into a clean layer on a map.\n\nTo extend the experience into the physical, Priti built a tangible interface: a set of cards, each embodying a specific recollection, that navigate the viewer to its associated data and connections when tapped on a reader. A keepsake box, not a database.\n\nThis talk walks through the full process behind the work, examining alternate forms of data collection, the iterative design decisions, and the thinking behind data experiences that encourage a deeper connection with the places we inhabit.\n"
speakerName = "Priti Pandurangan"
designation = "Information Experience Designer"
organisation = ""
speakerAbout = "Priti is a creative practitioner working globally across digital humanities, data, and computational futures through research, facilitation, and critical inquiry. Her personal practice explores pluralistic approaches to data and technology, focusing on forms of knowledge and epistemologies that resist quantification while holding space for lived experience, ambiguity, and affect.\n\nShe is also a data walker and facilitates data walks in cities around the world, enabling participants to engage with urban environments through situated and embodied interpretations.\n\nCentral to her work is how culture is held, transmitted, and reconfigured across contexts and temporalities, and the structures through which it is preserved and interpreted."
speakerImage = "/images/speakers/2026/speaker-priti.avif"
display = true
pageReady = true
order = 9

[[session]]
slug = "sand-data-wicked-problems"
sessionType = "Talks"
date = "2026-07-04"
time = "14:45 - 15:15"
slot = "afternoon"
venue = "Bangalore International Centre"
title = "Sand, Data, and Wicked Problems"
subtitle = "Open data alone does not build intention. You have to redirect the river."
shortDescription = "Illegal sand mining is destroying India's rivers. This talk traces how India Sand Watch uses open data, community building, and data visualization, from zines to court evidence to ML flipbooks, to build the intention needed to actually address it."
longDescription = "Wicked problems do not yield to data alone. The data is missing, the sources do not exist, the structures for implementation are absent, and the will to collaborate has not yet been built. Identifying the problem is nowhere near enough.\n\nWhen Veditum picked up the issue of illegal and destructive sand mining in India's rivers, they started with a reasonable assumption: use machine learning to identify illegal activity, and that would be enough to drive action. It was not.\n\nWhat they needed to build first was intention. And that required reimagining the entire response, with collaborators across NGOs, academia, the judiciary, media, private citizens, and state actors all in mind.\n\nThis talk traces what followed. India Sand Watch is now an open-data archive with over 50,000 data points, built on a Sites of Violence framework that maps the sand mining sector as a series of interconnected violations rather than isolated incidents. Getting there required data pipelines built through scaled volunteering, data sprints, and partnerships, each with its own visualization component.\n\nThe artefacts that came out of this work are as varied as the audiences they serve. Zines and sprint report cards for community volunteers. GIS maps for researchers and journalists. Visual evidence packages for court cases. And a physical flipbook that translates a machine learning model detecting mining activity from satellite imagery into something a non-technical audience can follow and act on.\n\nThe talk is about what it actually takes to use open data and visualization on problems that resist easy solutions: building the dataset, building the coalition, and building the case in forms that reach people with the power to change something.\n"
speakerName = "Siddharth Agarwal"
designation = "Founder"
organisation = "Veditum India Foundation"
speakerAbout = "Siddharth Agarwal has been walking across India and along India's rivers, attempting to document and bring stories of marginalised communities and the environment into the mainstream.\n\nSince 2014, he has walked 6000+ kms, including the lengths of the rivers Ganga and Ken. He is the founder of Veditum India Foundation where he is working to transform the environmental governance landscape in India.\n\nThe organisation - Veditum, has overseen long documentation and sensing expeditions of over 7000kms along 7 different rivers in India. These stories, captured as part of the Moving Upstream project and Fellowship have been distributed widely, and brought significant attention to the cause of these rivers.\n\nThrough the India Sand Watch project, Veditum is introducing accountability in the river sand mining sector in India. And through the Kolkata Change Makers initiative, they are creating a space for deep explorations in change making for and from the city.\n"
speakerImage = "/images/speakers/2026/speaker-siddharth.avif"
display = true
pageReady = true
order = 10

[[session]]
slug = "esankhyiki-viz-scale"
sessionType = "Talks"
date = "2026-07-04"
time = "11:15 - 11:45"
slot = "morning"
venue = "Bangalore International Centre"
title = "eSankhyiki: Visualization at Scale"
subtitle = "Public data should serve the public. The journey of doing it at India's scale."
shortDescription = "India's official statistics have never been easy to use. This talk shares how eSankhyiki, the NSO's unified data portal, embeds visualization into the full data lifecycle, from discovery to policy action, and what it took to build it at that scale."
longDescription = "India's official statistical system produces an enormous volume of data across hundreds of ministries and departments. Most of it has been difficult to find, harder to compare, and nearly impossible to use without specialist knowledge.\n\neSankhyiki is MoSPI's attempt to change that. A unified digital platform bringing together over 700 datasets and 136 million records into a single accessible interface. It is built on a core premise: visualization is not a presentation layer added at the end. It is part of the data lifecycle itself, from discovery and validation through to interpretation and policy action.\n\nThis talk walks through the design, development, and deployment of the portal. Rohit covers how user research shaped the visualization choices, how thematic dashboards and interactive filtering tools help users move from broad questions to specific insights, and how metadata-driven interfaces make complex socio-economic data navigable for audiences ranging from policymakers and researchers to journalists and citizens.\n\nYou will hear about the constraints that shape visualization in government and public sector environments: scale, data sensitivity, accessibility standards, and the need for long-term sustainability. And you will hear how those constraints were balanced against clarity, transparency, and trust, values that the team treated as non-negotiable.\n\nThe talk also touches on AI-enabled semantic search and how it complements visualization by improving data discovery before a user even reaches a chart.\n\nFor anyone building visualization systems at scale, or trying to make public data genuinely useful to the people it describes, this is a rare inside account of what that work actually involves.\n"
speakerName = "Rohit Bhardwaj"
designation = "Addl. Director General"
organisation = "MoSPI"
speakerAbout = "Rohit Bhardwaj is an Indian Statistical Service (ISS) officer of the 1998 batch. As Additional Director General, he is currently leading innovation and informatics initiatives at the National Statistical Office (NSO), India.\n\n Rohit initiated the development of eSankhyiki and dynamic visualizations to enhance data accessibility and user engagement in official statistics. He has been instrumental in identifying and initiating POCs and Pilots for use cases of emerging technologies in official statistics. He has successfully operationalized an innovation scheme that fosters collaboration with startups and academia to co-create data-driven solutions.\n\n His paper on creating a network of institutions for innovation in official statistics was recently accepted for presentation at the UNECE Conference on the Use of Generative AI in Official Statistics. His efforts have also led to the development of the data portal of MoSPI, resulting in tangible improvements in data dissemination and innovation."
