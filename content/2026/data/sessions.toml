[[session]]
slug = "dashboards-life-and-death"
sessionType = "Talks"
date = "2026-07-04"
time = ""
slot = "morning"
venue = "Bangalore International Centre"
title = "Designing Dashboards for Life and Death"
subtitle = "Every dashboard has a north star. Choose it wisely and the system follows."
shortDescription = "30 million people in Bangladesh live with high blood pressure. Only 11% had it under control. This talk traces how dashboard design, specifically which numbers are made visible and how they are defined, helped shift that to 60% across 400,000 patients"
longDescription = "Public health dashboards are political tools. The numbers at the top become the north star for the system. They shape what leaders are praised for, what gets funded, and what problems are considered urgent. Design a dashboard badly and the right problems stay invisible. Design it well and you can shift what a ministry pays attention to.\n\nIn 2018, Resolve to Save Lives partnered with Bangladesh's National Heart Foundation to pilot a national hypertension management program. Around 30 million people in Bangladesh live with high blood pressure. When the program started, only 20% had it under control. As of February 2026, more than 400,000 patients are enrolled and control rates have reached 60%.\n\nThis talk traces the dashboard design decisions behind that shift, across three areas.\n\nThe first is shared vocabulary. Scientists, bureaucrats, and frontline health workers do not naturally speak the same language of data. Tony's team tested and refined every metric definition and dashboard label until a ministry official could interpret and explain the numbers as confidently as a public health expert.\n\nThe second is essential data only. Medical officers in Bangladesh see 100 to 200 patients a day. That is roughly two minutes per patient. Data entry cannot take more than 20 seconds. The talk covers how to decide on the bare minimum needed to monitor program performance without breaking the clinical workflow.\n\nThe third is making the invisible visible. A small change in numerator or denominator can completely change what a decision-maker sees, surfacing patients at high risk, identifying likely returnees, catching emerging drug shortages before they become crises.\n\n7.8 million patients across 7 countries are now managed with a nearly identical dashboard. Some countries use it to surface bad numbers transparently. Others tweak definitions to look better. The design is the same. The choices around it are not.\n"
speakerName = "Tony Joy"
designation = "Senior Product Designer"
organisation = "Resolve to Save Lives"
speakerAbout = "Tony Joy is a Senior Product Designer at Resolve to Save Lives (RTSL), where he works on public health dashboards and digital systems for hypertension and diabetes programs. He helps ministries and public health teams collect and make sense of large-scale healthcare data. A lot of this work happens far away from air-conditioned offices, inside hot and busy government clinics where a single healthcare worker sees up to 200 patients a day. \n He has worked with the World Health Organisation, World Diabetes Foundation, University of Oslo, and multiple Ministries of Health to build dashboards used to monitor millions of hypertension and diabetes patients across low and middle income countries. He's especially interested in how data visualisation shapes incentives, priorities, and decision-making inside public health systems."
speakerImage = "/images/speakers/2026/speaker-tony-joy.webp"
display = true
pageReady = true
order = 13

[[session]]
slug = "infinite-design-space"
sessionType = "Talks"
date = "2026-07-04"
time = "16:00 - 17:15"
slot = "afternoon"
venue = "Bangalore International Centre"
title = "The Infinite Graphic Space: Beyond Grammar"
subtitle = "Every grammar is a map with edges. This keynote charts what lies beyond them."
shortDescription = "From the Grammar of Graphics to Vega-Lite to Go Fish to what comes next, every authoring tool encodes a theory of what visualization can be. This keynote traces that arc, confronts the limits of our inherited grammars, and asks what it means to design expressive authoring tools for visualization in an age when LLMs are rewriting the rules"
longDescription = "Every tool encodes a theory of what visualization is.\n\nThe Grammar of Graphics, gave the visualisation field a shared vocabulary: data, aesthetics, marks, scales. That declarative grammar drove a generation of authoring tools: ggplot2, Tableau, and Vega-Lite, bringing rigour to chart-making and making it possible, for the first time, to talk about visualization in a common language. Arvind was part of building that future. Vega & Vega-Lite are his work.\n\nThat was a profound shift. And it came with a quiet cost.\n\nThe grammar that liberated visualization from fixed chart types also became its own kind of ceiling. The design space has surprising limits, inconsistencies, and cliffs. Seemingly simple charts like mosaics, waffles, and ribbons fall outside the scope of most implementations. The most expressive, unconventional visualization work often happens in spite of the grammar, not because of it.\n\nExpanding what practitioners can make means expanding the grammar itself.\n\nGoFish is Arvind's current answer to that problem: a declarative grammar built on Gestalt principles that enables recursive composition. Operators that can be nested and overlapped arbitrarily and opening a design space that the Grammar of Graphics could not reach. A step toward an updated theory of data visualization, one open to an infinite space of graphic representations rather than a finite set of design configurations.\n\nThe future is less settled. LLMs have entered the authoring loop. Generation is cheap. The boundary between the tool and the author is blurring in ways that could  either democratize expressive visualization, or make us stop caring about expression altogether.\n\nThis keynote traces the full arc: the grammars that gave our field its foundations, the limits those grammars impose today, and the open question of what visualization authoring needs to become. What would authoring tools look like that keeps expanding rather than narrowing expressive range? And what do we lose if we let ease of generation replace intentionality of authoring?\n"
speakerName = "Arvind Satyanarayan"
designation = "Associate Professor"
organisation = "MIT CSAIL"
speakerAbout = "Arvind Satyanarayan is an Associate Professor of Computer Science at MIT EECS, and leads the Visualization Group at the MIT Computer Science and Artificial Intelligence Lab (CSAIL). His group uses data visualization as a petri dish to study intelligence augmentation, or how computational representations can help amplify human cognition and creativity.\n\nThis work has received awards at premier academic venues (including ACM CHI, IEEE VIS, and EuroVis), and honors including the Alfred P. Sloan Fellowship (2024), the IEEE VGTC Significant New Visualization Researcher Award (2022), a Google Research Scholar Award (2021), and a Kavli Frontiers of Science Fellow (2020). The visualization tools developed by Arvind and his collaborators, including Vega and Vega-Lite, are widely used in industry (including at Apple, Google, and Microsoft), on Wikipedia, and in the Jupyter data science community.\n"
speakerImage = "/images/speakers/2026/speaker-arvind-s.webp"
display = true
pageReady = true
order = 1

[[session]]
slug = "dashboards-of-our-discontent"
sessionType = "Talks"
date = "2026-07-04"
time = "16:00 - 16:30"
slot = "afternoon"
venue = "Bangalore International Centre"
title = "Dashboards of our Discontent"
subtitle = "More dashboards than ever. Still waiting for ones that actually work."
shortDescription = "Building a dashboard has never been easier. Shipping one that actually serves people is a different problem. This talk critiques the inherited assumptions behind public data dashboards and asks what it would take to build them as infrastructure instead."
longDescription = "The tooling has never been better. Drag-and-drop builders, low-code platforms, LLMs, chart libraries, templates for every use case. Government departments, NGOs, and civic tech projects are all shipping public data dashboards now. On the surface, this looks like progress.\n\nAman thinks most of it is the wrong kind of progress.\n\nThe problem is not technical skill or bad intentions. It is inherited assumptions: ideas about what a dashboard should be, absorbed from enterprise BI tools and never questioned for public contexts. The Big Ass Number. The Donut. The Bars. The download button. The assumption that if the data is visible, it is accessible.\n\nMost public dashboards get built, launched, maybe written about, and then sit there waiting for the next person to come along and build the same thing again. They look helpful. Put them through their paces and the complexity turns out to be shallow.\n\nThis talk is about the gap between the dashboards we keep building and the public data infrastructure we actually need. Drawing on experiments at Diagram Chasing and a survey of interfaces from national portals to scrappy civic tech projects, Aman walks through a critique of the current landscape, the design assumptions worth questioning specifically for public contexts, and the technical possibilities that are not being used nearly enough.\n\nThe FOSS ecosystem is better than ever. DuckDB WASM, PMTiles, MapLibre, parquets in the browser, webR. What would it look like to build public dashboards that cost nothing to host and outperform enterprise tools? What are the small but consequential decisions that shape whether a data interface actually serves the people it is built for?\n"
speakerName = "Aman Bhargava"
designation = "Developer"
organisation = "Diagram Chasing"
speakerAbout = "Aman Bhargava is a developer and independent researcher. He is interested in public-interest technology and making charts, with his work appearing in Reuters, Rest of World, and Unearthed by Greenpeace.\n\nHe co-runs Diagram Chasing, an independent publication dedicated to turning public data into compelling, accessible visual stories and tools.\n"
