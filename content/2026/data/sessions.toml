[[session]]
slug = "public-data-roundtable"
sessionType = "Dialogues"
date = "2026-07-03"
time = "18:30 to 20:30 "
slot = ""
venue = "Bangalore International Centre"
title = "Unlocking Public Sector Data & its Value"
subtitle = "Public data holds enormous promise. This roundtable asks what actually stands in the way."
shortDescription = "India's public data problem is no longer about whether datasets exist. It's about whether organisations can actually use them. This session brings 8 to 10 organisations building on public and administrative data into one room to test where the value is real, where it's overstated, and what keeps breaking. It closes with the raw material for a short, co-authored piece that puts concrete use cases on record."
longDescription = "The case for opening public and administrative data is usually made in the abstract. If the data existed in usable form, value would follow. The organisations actually building on public data know the gap between that assumption and reality. They keep solving the same problems through their own ingenuity: broken discovery, machine-unreadable formats, mismatched identifiers, missing metadata. Problems that arguably should not need private ingenuity to solve. \n This roundtable is for organisations that work directly with public and administrative datasets: researchers, builders, analysts, and policy practitioners who have gone from 'the dataset exists' to 'we built something useful' and know exactly where that path broke. A smaller, focused room serves this topic better than a panel. The goal is candid accounts, not polished positions. \n The conversation will move through three questions. Where has using public data produced something genuinely valuable, and what made that possible? Where is the value overstated, and what honest caveats does the room raise? And which break-points matter most: discovery, machine-readability, common identifiers, harmonised definitions, trust? The session will not attempt to produce policy recommendations or consensus positions. \n Participants leave with a shared account of what India's public data is actually good for, and their name on a short, co-authored piece that puts those use cases on record. This is an invite-only session, kept small so the conversation can go somewhere."
