longDescription = "Vanishing Wings is an immersive walk-through textile installation that visualizes the decline of insect populations as a consequence of anthropocentric development and ecological disruption. Through layered translucent textiles, embroidered insect forms, shifting stitch densities, and material transparency, the work translates biodiversity data into a sensory experience of abundance, fragmentation, and disappearance. Drawing on entomological research, species diversity records, and citizen-science datasets, the installation invites viewers to recognize insects as foundational agents of pollination, soil health, food systems, and ecological balance. Situated within urban and peri-urban landscapes, Vanishing Wings transforms more-than-human data into a contemplative encounter with climate change, interdependence, and loss."
speakerName = "Meghana Singh"
